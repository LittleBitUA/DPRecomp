# deadlyprem - ReXGlue codegen config
#
# Add named functions (indirect-call targets), midasm hooks, switch tables,
# and CRT addresses here as codegen and runtime surface issues.
#
# Cheat sheet for each section:
#
#   [functions]
#   # Force-register a function at ADDR (auto-discovery missed it). Optionally
#   # pin its end, parent (for nested splits), or give a custom name.
#   "0x82XXXXXX" = { name = "sub_82XXXXXX" }
#   "0x82XXXXXX" = { end = 0x82XXXXXX }
#   "0x82XXXXXX" = { end = 0x82XXXXXX, parent = 0x82XXXXXX }
#
#   [[switch_tables]]
#   # When codegen can't auto-detect a jump table, describe it manually.
#   address = 0x82XXXXXX
#   register = "r3"
#   labels = [0x82XXXXXX, 0x82XXXXXX]
#
#   [[midasm_hook]]
#   # Inject host code mid-instruction. Implement in src/deadlyprem_hooks.cpp.
#   #
#   # Variants:
#   #   - skip-an-instruction: set `jump_address` to the next-after-bad insn
#   #   - conditional skip: hook returns bool, with `jump_address_on_true`
#   #   - read/modify regs: list them in `registers = ["r3","r4"]`
#   #   - drop-in callable: `return = true` (codegen will RET from the hook)
#   address = 0x82XXXXXX
#   name = "DeadlypremExampleHook"
#   registers = ["r3"]
#   return = true
#
#   [rexcrt]
#   # If the game ships a static CRT, point rexglue at its memcpy/memset/etc so
#   # the runtime can substitute native vectorised versions.
#   memcpy  = 0x82XXXXXX
#   memset  = 0x82XXXXXX
#   memmove = 0x82XXXXXX

[functions]

# Tail-branch targets that GapFill did not register as standalone functions.
# Same SDK pattern as ESR's Workaround #2 (unconditional `b` to undiscovered target).
# Discovered on first codegen of DP PAL (media ID 7DE95D93).
"0x8236BE50" = { name = "sub_8236BE50" }  # tail target from 0x82472D6C
"0x825814F8" = { name = "sub_825814F8" }  # tail target from 0x8275C148
"0x825D2E18" = { name = "sub_825D2E18" }  # tail target from 0x825D2E24
"0x82627480" = { name = "sub_82627480" }  # tail target from 0x826326D0

# Runtime-discovered bctr/vtable thunks not seen by auto-discovery (no RTTI).
# Same pattern as ESR Workaround #1 — add as runtime crashes surface each one.
"0x82500920" = { name = "sub_82500920" }  # crash run-1, after SetInterruptCallback
"0x825E0278" = { name = "sub_825E0278" }  # crash run-2, in audio/XMA path
"0x825D6658" = { name = "sub_825D6658" }  # crash run-3
"0x8278CCB8" = { name = "sub_8278CCB8" }  # crash on "New Game" from main menu
"0x821FBEA8" = { name = "sub_821FBEA8" }  # crash during loading screen


